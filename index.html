<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeta Terra</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #050505; /* Cor de fundo do espaço */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container-terra {
            width: 300px;
            height: 300px;
            position: relative;
        }

        .terra {
            width: 100%;
            height: 100%;
            /* Imagem do Planeta Terra */
            background-image: url('https://upload.wikimedia.org');
            background-size: cover;
            border-radius: 50%; /* Faz a imagem ficar redonda */
            box-shadow: 
                inset -25px -25px 40px rgba(0,0,0,0.5)/* Sombra interna para dar volume */
                0 0 20px rgba(70, 130, 180, 0.5); /* Brilho azulado externo */
        }
    </style>
</head>
<body>

    <div class="container-terra">
        <div class="terra"></div>
    </div>

</body>
</html>
