<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo de Tiro HTML/CSS</title>
    <style>
        body {
            margin: 0;
            background: #222;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 20px;
        }

        /* Contador de Pontos */
        body { counter-reset: pontuacao; }

        .placar::after {
            content: counter(pontuacao);
            font-weight: bold;
            margin-left: 10px;
        }

        /* Mensagem de Level */
        .level-message {
            font-size: 36px;
            font-weight: bold;
            color: yellow;
            text-align: center;
            opacity: 0;
            animation: levelMessage 2s forwards;
            position: absolute;
            top: 50px;
            animation-delay: 1s;
        }

        @keyframes levelMessage {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1); }
        }

        /* Área do Jogo */
        .cenario {
            position: relative;
            width: 800px;
            height: 400px;
            background: #333;
            border: 5px solid #555;
            cursor: crosshair;
            overflow: hidden;
            margin-top: 20px;
        }

        /* Esconder os Checkboxes originais */
        input[type="checkbox"] {
            display: none;
        }

        /* Alvo */
        .alvo {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, red 20%, white 21%, white 40%, red 41%, red 60%, white 61%);
            border-radius: 50%;
            display: block;
            cursor: crosshair;
            transition: transform 0.2s;
        }

        /* Hitbox maior para facilitar */
        .alvo::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            width: 80px;
            height: 80px;
        }

        /* Sumir com o alvo ao ser atingido */
        input:checked + .alvo {
            display: none;
            counter-increment: pontuacao; /* incrementa a pontuação */
        }

        /* Animações dos Alvos */
        @keyframes mover1 {
            0% { left: -50px; top: 50px; }
            50% { top: 300px; }
            100% { left: 850px; top: 50px; }
        }

        @keyframes mover2 {
            0% { left: 850px; top: 50px; }
            50% { top: 300px; }
            100% { left: -50px; top: 50px; }
        }

        @keyframes mover3 {
            0% { left: -50px; top: 100px; }
            50% { top: 350px; }
            100% { left: 850px; top: 100px; }
        }

        @keyframes mover4 {
            0% { left: 850px; top: 100px; }
            50% { top: 350px; }
            100% { left: -50px; top: 100px; }
        }

        .alvo1 { animation: mover1 3s linear infinite; }
        .alvo2 { animation: mover2 4s linear infinite reverse; }
        .alvo3 { animation: mover3 3.5s ease-in-out infinite; animation-delay: 1s; }
        .alvo4 { animation: mover4 5s ease-in-out infinite; animation-delay: 2s; }

        /* Ajustando os alvos para cada fase */
        .fase-1 .alvo1, .fase-1 .alvo2, .fase-1 .alvo3, .fase-1 .alvo4, .fase-1 .alvo5 {
            display: block;
        }

        .fase-2 .alvo1, .fase-2 .alvo2, .fase-2 .alvo3, .fase-2 .alvo4, .fase-2 .alvo5,
        .fase-2 .alvo6, .fase-2 .alvo7, .fase-2 .alvo8, .fase-2 .alvo9, .fase-2 .alvo10 {
            display: block;
        }

        .fase-3 .alvo1, .fase-3 .alvo2, .fase-3 .alvo3, .fase-3 .alvo4, .fase-3 .alvo5,
        .fase-3 .alvo6, .fase-3 .alvo7, .fase-3 .alvo8, .fase-3 .alvo9, .fase-3 .alvo10,
        .fase-3 .alvo11, .fase-3 .alvo12, .fase-3 .alvo13, .fase-3 .alvo14, .fase-3 .alvo15,
        .fase-3 .alvo16, .fase-3 .alvo17, .fase-3 .alvo18, .fase-3 .alvo19, .fase-3 .alvo20 {
            display: block;
        }

        .fase-4 .alvo1, .fase-4 .alvo2, .fase-4 .alvo3, .fase-4 .alvo4, .fase-4 .alvo5,
        .fase-4 .alvo6, .fase-4 .alvo7, .fase-4 .alvo8, .fase-4 .alvo9, .fase-4 .alvo10,
        .fase-4 .alvo11, .fase-4 .alvo12, .fase-4 .alvo13, .fase-4 .alvo14, .fase-4 .alvo15,
        .fase-4 .alvo16, .fase-4 .alvo17, .fase-4 .alvo18, .fase-4 .alvo19, .fase-4 .alvo20,
        .fase-4 .alvo21, .fase-4 .alvo22, .fase-4 .alvo23, .fase-4 .alvo24, .fase-4 .alvo25,
        .fase-4 .alvo26, .fase-4 .alvo27, .fase-4 .alvo28, .fase-4 .alvo29, .fase-4 .alvo30 {
            display: block;
        }

        .fase-5 .alvo1, .fase-5 .alvo2, .fase-5 .alvo3, .fase-5 .alvo4, .fase-5 .alvo5,
        .fase-5 .alvo6, .fase-5 .alvo7, .fase-5 .alvo8, .fase-5 .alvo9, .fase-5 .alvo10,
        .fase-5 .alvo11, .fase-5 .alvo12, .fase-5 .alvo13, .fase-5 .alvo14, .fase-5 .alvo15,
        .fase-5 .alvo16, .fase-5 .alvo17, .fase-5 .alvo18, .fase-5 .alvo19, .fase-5 .alvo20,
        .fase-5 .alvo21, .fase-5 .alvo22, .fase-5 .alvo23, .fase-5 .alvo24, .fase-5 .alvo25,
        .fase-5 .alvo26, .fase-5 .alvo27, .fase-5 .alvo28, .fase-5 .alvo29, .fase-5 .alvo30,
        .fase-5 .alvo31, .fase-5 .alvo32, .fase-5 .alvo33, .fase-5 .alvo34, .fase-5 .alvo35 {
            display: block;
        }
