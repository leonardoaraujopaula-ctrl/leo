<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiro ao Alvo - 5 Fases</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0a0a1f;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }
    h1 { margin: 0 0 10px 0; }
    #game-container {
      position: relative;
      border: 4px solid #ff4444;
      border-radius: 10px;
      box-shadow: 0 0 25px #ff0000;
    }
    canvas {
      background: #112233;
      display: block;
      cursor: crosshair;
    }
    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 22px;
      pointer-events: none;
    }
    button {
      margin-top: 15px;
      padding: 12px 25px;
      font-size: 18px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .level-complete {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <h1>🎯 TIRO AO ALVO</h1>
  <div id="game-container">
    <canvas id="gameCanvas" width="600" height="500"></canvas>
    
    <div class="hud">
      <div>Fase: <span id="level">1</span>/5</div>
      <div>Pontos: <span id="score">0</span></div>
      <div>Alvos: <span id="targets">0</span></div>
    </div>
  </div>

  <button onclick="startGame()">Iniciar Jogo</button>

  <div id="levelComplete" class="level-complete">
    <h2>Fase <span id="completedLevel"></span> Concluída!</h2>
    <p>Pontuação: <span id="levelScore"></span></p>
    <button onclick="nextLevel()">Próxima Fase →</button>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const targetsEl = document.getElementById("targets");
    const levelCompleteScreen = document.getElementById("levelComplete");

    let score = 0;
    let currentLevel = 1;
    let targets = [];
    let gameRunning = false;
    let levelTime = 0;
    let timerInterval;

    class Target {
      constructor() {
        this.reset();
      }
      reset() {
        const difficulty = currentLevel;
        this.size = Math.max(25, 55 - difficulty * 5);     // fica menor
        this.x = Math.random() * (canvas.width - this.size) + this.size/2;
        this.y = Math.random() * (canvas.height - this.size) + this.size/2;
        this.life = 80 - difficulty * 8;  // tempo de vida menor
        this.maxLife = this.life;
      }
    }

    function spawnTarget() {
      if (targets.length < 3 + currentLevel) {
        targets.push(new Target());
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Desenhar alvos
      targets.forEach((target, index) => {
        const alpha = target.life / target.maxLife;
        
        // Círculo externo
        ctx.beginPath();
        ctx.arc(target.x, target.y, target.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 80, 80, ${alpha})`;
        ctx.fill();

        // Círculo interno
        ctx.beginPath();
        ctx.arc(target.x, target.y, target.size * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.fill();

        // Centro
        ctx.beginPath();
        ctx.arc(target.x, target.y, target.size * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 0, 0, ${alpha})`;
        ctx.fill();

        target.life--;
        if (target.life <= 0) {
          targets.splice(index, 1);
        }
      });
    }

    function gameLoop() {
      if (!gameRunning) return;
      draw();
      targetsEl.textContent = targets.length;
    }

    function startLevel() {
      targets = [];
      levelTime = 0;
      
      // Dificuldade por fase
      const spawnRate = Math.max(400, 900 - currentLevel * 80);
      
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        levelTime++;
        spawnTarget();
        
        // Tempo máximo por fase (aumenta um pouco)
        if (levelTime > 35 + currentLevel * 5) {
          endLevel();
        }
      }, spawnRate);

      gameRunning = true;
    }

    function endLevel() {
      gameRunning = false;
      clearInterval(timerInterval);
      
      document.getElementById("completedLevel").textContent = currentLevel;
      document.getElementById("levelScore").textContent = score;
      levelCompleteScreen.style.display = "block";
    }

    function nextLevel() {
      levelCompleteScreen.style.display = "none";
      currentLevel++;
      levelEl.textContent = currentLevel;
      
      if (currentLevel > 5) {
        alert("🏆 PARABÉNS! Você completou todas as 5 fases!\nPontuação Final: " + score);
        currentLevel = 1;
        score = 0;
      }
      
      startLevel();
    }

    // Clique para atirar
    canvas.addEventListener("click", (e) => {
      if (!gameRunning) return;

      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const clickY = e.clientY - rect.top;

      for (let i = targets.length - 1; i >= 0; i--) {
        const t = targets[i];
        const distance = Math.hypot(t.x - clickX, t.y - clickY);
        
        if (distance < t.size) {
          // Acertou!
          const points = Math.floor(t.size * 2);
          score += points;
          scoreEl.textContent = score;
          
          // Efeito de acerto
          ctx.fillStyle = "yellow";
          ctx.fillRect(clickX-5, clickY-5, 10, 10);
          
          targets.splice(i, 1);
          spawnTarget(); // novo alvo aparece
          break;
        }
      }
    });

    function startGame() {
      score = 0;
      currentLevel = 1;
      scoreEl.textContent = score;
      levelEl.textContent = currentLevel;
      levelCompleteScreen.style.display = "none";
      startLevel();
    }

    // Loop do jogo
    setInterval(gameLoop, 16);
  </script>
</body>
</html>
