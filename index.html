<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Olá Mundo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: grid;
            place-items: center;
            background-color: #0f0f23;
            color: #00ff9f;
            font-family: monospace;
            font-size: 4rem;
            text-align: center;
            position: relative;
        }

        .earth {
            width: 30%;  /* Ajusta o tamanho do globo */
            height: auto;  /* Mantém a proporção */
            margin-top: 20px; /* Adiciona um espaço entre o texto e o globo */
        }
    </style>
</head>
<body>
    Olá Mundo!
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg" alt="Planeta Terra" class="earth">
</body>
</html>
