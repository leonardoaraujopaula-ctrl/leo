<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiro ao Alvo - 5 Fases</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎯 TIRO AO ALVO</h1>
  <canvas id="canvas" width="600" height="500"></canvas>

  <div class="hud">
    <div>Fase: <span id="level">1</span> / 5</div>
    <div>Pontuação: <span id="score">0</span></div>
    <div>Alvos: <span id="remaining">0</span></div>
  </div>

  <button onclick="startNewGame()">Novo Jogo</button>

  <div id="levelScreen" class="level-screen">
    <h2>Fase <span id="currentLevel">1</span> Concluída!</h2>
    <p>Pontos nesta fase: <span id="phasePoints">0</span></p>
    <p>Total: <span id="totalScore">0</span></p>
    <button onclick="nextPhase()">Próxima Fase →</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
