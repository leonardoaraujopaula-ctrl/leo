<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeta Terra</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, #1a1a1a, #4b4b4b); /* Gradiente para iluminar o fundo */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container-terra {
            width: 300px;
            height: 300px;
            position: relative;
        }

        .terra {
            width: 100%;
            height: 100%;
            /* Imagem do Planeta Terra */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/8/8f/Earth_Eastern_Hemisphere.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 50%; /* Faz a imagem ficar redonda */
            box-shadow: 
                inset -25px -25px 40px rgba(0,0,0,0.5), /* Sombra interna para dar volume */
                0 0 40px rgba(70, 130, 180, 0.6); /* Brilho azulado mais forte */
        }
    </style>
</head>
<body>

    <div class="container-terra">
        <div class="terra"></div>
    </div>

</body>
</html>
