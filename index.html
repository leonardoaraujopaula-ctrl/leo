<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo de Tiro HTML/CSS</title>
    <style>
        body {
            margin: 0;
            background: #222;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Área do Jogo */
        .cenario {
            position: relative;
            width: 800px;
            height: 400px;
            background: #333;
            border: 5px solid #555;
            cursor: crosshair; /* Muda o mouse para uma mira */
            overflow: hidden;
        }

        /* Contador de Pontos (usando Counter do CSS) */
        body { counter-reset: pontuacao; }
        
        input:checked { counter-increment: pontuacao; }
        
        .placar::after {
            content: counter(pontuacao);
            font-size: 24px;
            font-weight: bold;
        }

        /* Esconder os Checkboxes originais */
        input[type="checkbox"] {
            display: none;
        }

        /* O Alvo (Label do Checkbox) */
        .alvo {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, red 20%, white 21%, white 40%, red 41%, red 60%, white 61%);
            border-radius: 50%;
            display: block;
            cursor: crosshair;
            transition: transform 0.2s;
        }

        /* Sumir com o alvo ao ser "atingido" */
        input:checked + .alvo {
            display: none;
        }

        /* Animações dos Alvos */
        @keyframes mover {
            0% { left: -50px; top: 50px; }
            50% { top: 300px; }
            100% { left: 850px; top: 50px; }
        }

        .alvo1 { animation: mover 4s linear infinite; }
        .alvo2 { animation: mover 6s linear infinite reverse; }
        .alvo3 { animation: mover 3s ease-in-out infinite; animation-delay: 1s; }

    </style>
</head>
<body>

    <h1>Stand de Tiro CSS</h1>
    <div class="placar">Alvos abatidos: </div>

    <div class="cenario">
        <input type="checkbox" id="a1">
        <label for="a1" class="alvo alvo1"></label>

        <input type="checkbox" id="a2">
        <label for="a2" class="alvo alvo2"></label>

        <input type="checkbox" id="a3">
        <label for="a3" class="alvo alvo3"></label>
    </div>

    <p>Clique nos alvos para eliminá-los!</p>

</body>
</html>
