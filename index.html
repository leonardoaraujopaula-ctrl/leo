<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Olá Mundo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: grid;
            place-items: center;
            background-color: #0f0f23;
            color: #00ff9f;
            font-family: monospace;
            font-size: 4rem;
            text-align: center;
            position: relative;
        }

        /* Efeito no texto */
        .text {
            background: linear-gradient(45deg, #ff6ec7, #ff7eb3, #ff6a00); /* Gradiente de cor */
            -webkit-background-clip: text;
            color: transparent; /* Torna o texto transparente, o gradiente toma conta */
            animation: pulse 1.5s infinite alternate; /* Animação de pulsar */
            text-shadow: 0 0 15px rgba(0, 255, 159, 0.7), 0 0 30px rgba(0, 255, 159, 0.5); /* Sombra para brilhar */
        }

        /* Animação de pulso */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.1);
            }
        }

        .earth {
            width: 30%;  /* Ajusta o tamanho do globo */
            height: auto;  /* Mantém a proporção */
            margin-top: 20px; /* Adiciona um espaço entre o texto e o globo */
        }
    </style>
</head>
<body>
    <span class="text">Olá Mundo!</span>
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg" alt="Planeta Terra" class="earth">
</body>
</html>
