<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo de Tiro HTML/CSS</title>
    <style>
        body {
            margin: 0;
            background: #222;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 20px;
        }

        /* Contador de Pontos */
        body { counter-reset: pontuacao; }

        .placar::after {
            content: counter(pontuacao);
            font-weight: bold;
            margin-left: 10px;
        }

        /* Área do Jogo */
        .cenario {
            position: relative;
            width: 800px;
            height: 400px;
            background: #333;
            border: 5px solid #555;
            cursor: crosshair;
            overflow: hidden;
            margin-top: 20px;
        }

        /* Esconder os Checkboxes originais */
        input[type="checkbox"] {
            display: none;
        }

        /* Alvo */
        .alvo {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, red 20%, white 21%, white 40%, red 41%, red 60%, white 61%);
            border-radius: 50%;
            display: block;
            cursor: crosshair;
            transition: transform 0.2s;
        }

        /* Hitbox maior para facilitar */
        .alvo::before {
            content: '';
            position: absolute;
            top: -15px;
            left: -15px;
            width: 80px;
            height: 80px;
        }

        /* Sumir com o alvo ao ser atingido */
        input:checked + .alvo {
            display: none;
            counter-increment: pontuacao; /* incrementa a pontuação */
        }

        /* Animações dos Alvos */
        @keyframes mover1 {
            0% { left: -50px; top: 50px; }
            50% { top: 300px; }
            100% { left: 850px; top: 50px; }
        }

        @keyframes mover2 {
            0% { left: 850px; top: 50px; }
            50% { top: 300px; }
            100% { left: -50px; top: 50px; }
        }

        @keyframes mover3 {
            0% { left: -50px; top: 100px; }
            50% { top: 350px; }
            100% { left: 850px; top: 100px; }
        }

        @keyframes mover4 {
            0% { left: 850px; top: 100px; }
            50% { top: 350px; }
            100% { left: -50px; top: 100px; }
        }

        .alvo1 { animation: mover1 4s linear infinite; }
        .alvo2 { animation: mover2 6s linear infinite reverse; }
        .alvo3 { animation: mover3 5s ease-in-out infinite; animation-delay: 1s; }
        .alvo4 { animation: mover4 6s ease-in-out infinite; animation-delay: 2s; }

        .alvo5 { animation: mover1 7s linear infinite; }
        .alvo6 { animation: mover2 8s linear infinite reverse; }
        .alvo7 { animation: mover3 9s ease-in-out infinite; animation-delay: 3s; }
        .alvo8 { animation: mover4 10s ease-in-out infinite; animation-delay: 4s; }

        .alvo9 { animation: mover1 11s linear infinite; }
        .alvo10 { animation: mover2 12s linear infinite reverse; }
        .alvo11 { animation: mover3 13s ease-in-out infinite; animation-delay: 5s; }
        .alvo12 { animation: mover4 14s ease-in-out infinite; animation-delay: 6s; }

        .alvo13 { animation: mover1 15s linear infinite; }
        .alvo14 { animation: mover2 16s linear infinite reverse; }
        .alvo15 { animation: mover3 17s ease-in-out infinite; animation-delay: 7s; }
        .alvo16 { animation: mover4 18s ease-in-out infinite; animation-delay: 8s; }

        .alvo17 { animation: mover1 19s linear infinite; }
        .alvo18 { animation: mover2 20s linear infinite reverse; }
        .alvo19 { animation: mover3 21s ease-in-out infinite; animation-delay: 9s; }
        .alvo20 { animation: mover4 22s ease-in-out infinite; animation-delay: 10s; }

        p {
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <h1>Stand de Tiro CSS</h1>
    <div class="placar">Alvos abatidos:</div>

    <div class="cenario">
        <!-- Alvos -->
        <input type="checkbox" id="a1"><label for="a1" class="alvo alvo1"></label>
        <input type="checkbox" id="a2"><label for="a2" class="alvo alvo2"></label>
        <input type="checkbox" id="a3"><label for="a3" class="alvo alvo3"></label>
        <input type="checkbox" id="a4"><label for="a4" class="alvo alvo4"></label>
        <input type="checkbox" id="a5"><label for="a5" class="alvo alvo5"></label>
        <input type="checkbox" id="a6"><label for="a6" class="alvo alvo6"></label>
        <input type="checkbox" id="a7"><label for="a7" class="alvo alvo7"></label>
        <input type="checkbox" id="a8"><label for="a8" class="alvo alvo8"></label>
        <input type="checkbox" id="a9"><label for="a9" class="alvo alvo9"></label>
        <input type="checkbox" id="a10"><label for="a10" class="alvo alvo10"></label>
        <input type="checkbox" id="a11"><label for="a11" class="alvo alvo11"></label>
        <input type="checkbox" id="a12"><label for="a12" class="alvo alvo12"></label>
        <input type="checkbox" id="a13"><label for="a13" class="alvo alvo13"></label>
        <input type="checkbox" id="a14"><label for="a14" class="alvo alvo14"></label>
        <input type="checkbox" id="a15"><label for="a15" class="alvo alvo15"></label>
        <input type="checkbox" id="a16"><label for="a16" class="alvo alvo16"></label>
        <input type="checkbox" id="a17"><label for="a17" class="alvo alvo17"></label>
        <input type="checkbox" id="a18"><label for="a18" class="alvo alvo18"></label>
        <input type="checkbox" id="a19"><label for="a19" class="alvo alvo19"></label>
        <input type="checkbox" id="a20"><label for="a20" class="alvo alvo20"></label>
    </div>

    <p>Clique nos alvos para eliminá-los!</p>

</body>
</html>
